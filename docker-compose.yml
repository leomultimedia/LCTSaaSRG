version: '3.8'

services:
  insightflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightflow-saas-node
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    restart: always

networks:
  default:
    name: insightflow-network
